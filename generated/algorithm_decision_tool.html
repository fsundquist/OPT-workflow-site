<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPT Standard Algoritm 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        .content {
            padding: 40px;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        .control-group label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 0.95em;
        }
        .control-group input,
        .control-group select {
            padding: 10px 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        .control-group input:focus,
        .control-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .results-section {
            margin-top: 30px;
        }
        .result-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            display: none;
        }
        .result-card.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .result-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        .result-card p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .result-card .label {
            font-weight: 600;
            color: #333;
        }
        .recommendation {
            background: white;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        .recommendation h4 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .recommendation .value {
            font-size: 1.2em;
            font-weight: bold;
            color: #764ba2;
        }
        .no-match {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
        .no-match.show {
            display: block;
        }
        .calculation {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-top: 15px;
            border-radius: 4px;
            display: none;
        }
        .calculation.show {
            display: block;
        }
        .calculation .label {
            font-weight: 600;
            color: #1565c0;
        }
    </style>
</head>
<body>
    <div class="container">

        </div>
        
        <div class="content">
            <div class="controls">
                <div class="control-group">
                    <label for="psa">PSA-värde (ng/mL):</label>
                    <input type="number" id="psa" placeholder="t.ex. 5.5" step="0.1" min="0">
                </div>
                <div class="control-group">
                    <label for="prostate">Prostatastorlek (mL):</label>
                    <input type="number" id="prostate" placeholder="t.ex. 30" step="1" min="0">
                </div>
                <div class="control-group">
                    <label for="pirads">PI-RADS (senast MR):</label>
                    <select id="pirads">
                        <option value="">-- Välj PI-RADS --</option>

                        <option value="PI-RADS = 3">PI-RADS 3</option>
                        <option value="PI-RADS = 4-5">PI-RADS 4-5</option>

                </div>
                <div class="control-group">

                </div>
                <div class="control-group">
                    <label for="biopsy_prev">Tidigare biopsi?</label>
                    <select id="biopsy_prev">
                        <option value="">-- Välj --</option>
                        <option value="J">Ja</option>
                        <option value="N">Nej</option>
                    </select>
                </div>
            </div>
            
            <div class="results-section">
                <div id="matched-results"></div>
                <div id="no-match" class="no-match">
                    ⚠️ Ingen matchande regel hittades. Kontrollera inmatade värden.
                </div>
            </div>
        </div>
    </div>

        const psaInput = document.getElementById('psa');
        const prostateInput = document.getElementById('prostate');
        const piradsInput = document.getElementById('pirads');
        const pirads_prevInput = document.getElementById('pirads_prev');
        const biopsy_prevInput = document.getElementById('biopsy_prev');
        const matchedResultsDiv = document.getElementById('matched-results');
        const noMatchDiv = document.getElementById('no-match');
        
        function getPSARange(psa) {
            if (psa < 0.1) return null;
            if (psa < 1) return '0.1=<PSA<1';
            if (psa < 3) return '1=<PSA<3';
            if (psa < 10) return '3=<PSA<10';
            return 'PSA>=10';
        }
        
        function findMatchingRules() {
            const psa = parseFloat(psaInput.value);
            const prostate = parseFloat(prostateInput.value);
            const pirads = piradsInput.value;
            const pirads_prev = pirads_prevInput.value;
            const biopsy_prev = biopsy_prevInput.value;
            
            if (isNaN(psa)) {
                matchedResultsDiv.innerHTML = '';
                noMatchDiv.classList.remove('show');
                return;
            }
            
            const psaRange = getPSARange(psa);
            if (!psaRange) {
                noMatchDiv.classList.add('show');
                matchedResultsDiv.innerHTML = '';
                return;
            }
            
            // Find matching rules
            const matches = rules.filter(rule => {
                let match = rule.psa_range === psaRange;
                
                if (match && pirads) {
                    match = rule.mr_current === pirads;
                }
                
                if (match && pirads_prev) {
                    match = rule.mr_previous === pirads_prev;
                }
                
                return match;
            });
            
            if (matches.length === 0) {
                noMatchDiv.classList.add('show');
                matchedResultsDiv.innerHTML = '';
            } else {
                noMatchDiv.classList.remove('show');
                displayMatches(matches, psa, prostate);
            }
        }
        
        function displayMatches(matches, psa, prostate) {
            let html = '';
            
            for (const match of matches) {
                html += `
                    <div class="result-card show">
                        <h3>Rule {'#'}${match.number}</h3>
                        
                        <p><span class="label">PSA Range:</span> ${match.psa_range}</p>
                        
                        ${match.mr_current ? `<p><span class="label">Current PI-RADS:</span> ${match.mr_current}</p>` : ''}
                        ${match.mr_previous ? `<p><span class="label">Previous PI-RADS:</span> ${match.mr_previous}</p>` : ''}
                        
                        ${match.psad ? `<p><span class="label">PSA-D:</span> ${match.psad}</p>` : ''}
                        ${match.delta_psad ? `<p><span class="label">Delta PSA-D:</span> ${match.delta_psad}</p>` : ''}
                        
                        <div class="recommendation">
                            <h4>Rekommendation:</h4>
                            <p>
                                <span class="label">Remiss urolog:</span>
                                <span class="value">${match.urologist_referral}</span>
                            </p>
                            ${match.biopsy_indication ? `<p><span class="label">Biopsi-indikation:</span> ${match.biopsy_indication}</p>` : ''}
                        </div>
                        
                        ${match.comment ? `<p style="margin-top: 15px; font-style: italic; color: #666;"><span class="label">Notering:</span> ${match.comment}</p>` : ''}
                    </div>
                `;
            }
            
            // Add calculation if prostate size is provided
            if (!isNaN(prostate) && prostate > 0 && !isNaN(psa)) {
                const psad = (psa / prostate).toFixed(3);
                html += `
                    <div class="calculation show">
                        <p><span class="label">Beräknad PSA-densitet (PSAD):</span> ${psad} (= ${psa} / ${prostate})</p>
                    </div>
                `;
            }
            
            matchedResultsDiv.innerHTML = html;
        }
        
        psaInput.addEventListener('input', findMatchingRules);
        prostateInput.addEventListener('input', findMatchingRules);
        piradsInput.addEventListener('change', findMatchingRules);
        pirads_prevInput.addEventListener('change', findMatchingRules);
        biopsy_prevInput.addEventListener('change', findMatchingRules);
    </script>
